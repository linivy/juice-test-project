[pytest]
# 测试文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试路径（按页面类型分类）
testpaths = 
    test/forms
    test/detail
    test/list
    test/common
    test/api
    test/smoke
    test/regression

# 标记（用于选择性运行）
markers =
    smoke: 冒烟测试（核心功能）
    critical: 关键路径测试
    regression: 回归测试（定时任务）
    slow: 耗时较长的测试
    forms: 表单页面测试
    detail: 详情页面测试
    list: 列表页面测试
    api: API 测试
    login: 登录功能
    search: 搜索功能
    orders: 订单功能

# 报告配置
addopts = -v --tb=short

# 测试结果目录
test_results_dir = test-resultsNew-Item -ItemType Directory -Path test\forms, test\detail, test\list, test\common, test\api, test\smoke, test\regression
New-Item -ItemType Directory -Path test\forms, test\detail, test\list, test\common, test\api, test\smoke, test\regression