[pytest]
# 测试目录
testpaths = test

# 忽略模板目录
norecursedirs = templates templates_backup __pycache__ venv .venv

# 命令行选项
addopts = 
    -v
    --strict-markers
    --tb=short
    --html=test-reports/test_report.html
    --self-contained-html

# 自定义标记
markers =
    smoke: 冒烟测试用例
    regression: 回归测试用例
    slow: 执行较慢的测试用例
    security: 安全测试用例

# 并行 + 多浏览器 + HTML报告
# pytest test/ -n 2 --browser=chromium --browser=firefox --html=test-reports/parallel_report.html --self-contained-html -v

# 只并行，不双浏览器
# pytest test/ -n 2 --html=test-reports/parallel_report.html --self-contained-html -v
