[pytest]
# 测试目录
testpaths = test

# 忽略模板目录
norecursedirs = templates templates_backup __pycache__ venv .venv

# 命令行选项
addopts = 
    -v
    --strict-markers
    --tb=short
    --html=test-reports/test_report.html
    --self-contained-html

# 自定义标记
markers =
    smoke: 冒烟测试用例
    regression: 回归测试用例
    slow: 执行较慢的测试用例
    security: 安全测试用例