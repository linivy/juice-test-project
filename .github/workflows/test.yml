name: Run Tests

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - '**.md'
      - '.gitignore'
  
  pull_request:
    branches: [ main ]
  
  workflow_dispatch:
    inputs:
      test_level:
        description: '选择测试级别'
        required: true
        default: 'smoke'
        type: choice
        options:
          - 'smoke'
          - 'critical'
          - 'regression'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pytest pytest-playwright
          playwright install chromium
      
      - name: Start Juice Shop
        run: docker run -d -p 3000:3000 bkimminich/juice-shop
      
      - name: Wait for Juice Shop
        run: sleep 10
      
      - name: Determine test scope
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "test_path=test/smoke/" >> $GITHUB_OUTPUT
            echo "test_level=smoke" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "test_path=test/smoke/ test/forms/ test/list/ test/common/" >> $GITHUB_OUTPUT
            echo "test_level=critical" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.inputs.test_level }}" = "smoke" ]; then
            echo "test_path=test/smoke/" >> $GITHUB_OUTPUT
            echo "test_level=smoke" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.inputs.test_level }}" = "critical" ]; then
            echo "test_path=test/smoke/ test/forms/ test/list/ test/common/" >> $GITHUB_OUTPUT
            echo "test_level=critical" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.inputs.test_level }}" = "regression" ]; then
            echo "test_path=test/" >> $GITHUB_OUTPUT
            echo "test_level=regression" >> $GITHUB_OUTPUT
          fi
      
      - name: Run tests
        id: tests
        run: |
          pytest ${{ steps.scope.outputs.test_path }} -v --tb=short 2>&1 | tee test-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-${{ steps.scope.outputs.test_level }}
          path: |
            test-results/
            test-output.txt
          retention-days: 7

      - name: Create Issue on push failure
        if: steps.tests.outputs.exit_code != '0' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          FAILED=$(grep "FAILED" test-output.txt | head -3 | tr '\n' ';')
          echo "测试失败: ${RUN_URL}\n测试级别: ${{ steps.scope.outputs.test_level }}\n失败用例: ${FAILED}" > issue_body.md
          gh issue create --title "[自动化Bug] 测试失败 - 运行 #${RUN_NUMBER}" --body-file issue_body.md --label "bug"

      - name: Comment on PR failure
        if: steps.tests.outputs.exit_code != '0' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          FAILED=$(grep "FAILED" test-output.txt | head -3 | tr '\n' ';')
          echo "测试失败: [查看详情](${RUN_URL})\n测试级别: ${{ steps.scope.outputs.test_level }}\n失败用例: ${FAILED}" > pr_comment.md
          gh pr comment ${PR_NUMBER} --body-file pr_comment.md
