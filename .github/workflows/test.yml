name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pytest pytest-playwright
          playwright install chromium
      
      - name: Start Juice Shop
        run: docker run -d -p 3000:3000 bkimminich/juice-shop
      
      - name: Wait for Juice Shop
        run: sleep 10
      
      - name: Run tests
        id: tests
        run: |
          pytest test/ -v --tb=short 2>&1 | tee test-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: Debug info
        if: always()
        run: |
          echo "exit_code: ${{ steps.tests.outputs.exit_code }}"
          echo "event_name: ${{ github.event_name }}"
          echo "是否创建 Issue: ${{ steps.tests.outputs.exit_code != '0' && github.event_name == 'push' }}"
          cat test-output.txt

      - name: Create Issue on failure
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          echo "检查是否需要创建 Issue..."
          
          if [ "${{ steps.tests.outputs.exit_code }}" != "0" ] && [ "${{ github.event_name }}" = "push" ]; then
            echo "测试失败，创建 Issue..."
            FAILED_TESTS=$(grep "FAILED" test-output.txt | head -10 || echo "未知测试")
            
            echo "失败的测试: $FAILED_TESTS"
            
            gh issue create \
              --title "[自动化Bug] 测试失败 - 运行 #${RUN_NUMBER}" \
              --body "## 🐛 测试失败的报告\n\n**运行链接**: ${RUN_URL}\n\n**失败的测试**:\n\`\`\`\n${FAILED_TESTS}\n\`\`\`\n\n请查看日志确认失败原因。" \
              --label "bug,auto-reported"
            
            echo "Issue 创建成功！"
          else
            echo "不需要创建 Issue (exit_code: ${{ steps.tests.outputs.exit_code }}, event: ${{ github.event_name }})"
          fi