name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pytest playwright pytest-playwright
          playwright install chromium
      
      - name: Start Juice Shop
        run: docker run -d -p 3000:3000 bkimminich/juice-shop
      
      - name: Wait for Juice Shop
        run: sleep 10
      
      - name: Create test results directory
        run: mkdir -p test-results

      - name: Run tests
        run: pytest test/ -v --tb=short --junitxml=test-results/results.xml 2>&1 | tee test-results/output.txt || true

      - name: Extract failures
        run: |
          grep -A 20 "FAILED" test-results/output.txt > test-results/failures.txt || echo "No failures found" > test-results/failures.txt

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7