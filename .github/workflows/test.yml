name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pytest pytest-playwright
          playwright install chromium
      
      - name: Start Juice Shop
        run: docker run -d -p 3000:3000 bkimminich/juice-shop
      
      - name: Wait for Juice Shop
        run: sleep 10
      
      - name: Run tests
        id: tests
        continue-on-error: true
        run: |
          pytest test/ -v --tb=short 2>&1 | tee test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Create Issue on failure
        if: steps.tests.outputs.exit_code != '0' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          # 切换到仓库目录（确保有 .git）
          cd ${{ github.workspace }}
          
          FAILED_TESTS=$(grep "FAILED" test-output.txt | head -10 || echo "未知测试")
          
          gh issue create \
            --title "[自动化Bug] 测试失败 - 运行 #${RUN_NUMBER}" \
            --body "## 🐛 测试失败报告\n\n**运行链接**: ${RUN_URL}\n\n**失败的测试**:\n\`\`\`\n${FAILED_TESTS}\n\`\`\`\n\n请查看日志确认失败原因。" \
            --label "bug,auto-reported"