name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pytest pytest-playwright
          playwright install chromium
      
      - name: Start Juice Shop
        run: docker run -d -p 3000:3000 bkimminich/juice-shop
      
      - name: Wait for Juice Shop
        run: sleep 10
      
      - name: Create test results directory
        run: mkdir -p test-results

      - name: Run tests
        id: tests
        continue-on-error: true
        run: |
          pytest test/ -v --tb=short --junitxml=test-results/results.xml 2>&1 | tee test-results/output.txt

      - name: Check test status
        id: check
        run: |
          if grep -q "FAILED" test-results/output.txt; then
            echo "tests_failed=true" >> $GITHUB_OUTPUT
            echo "测试失败"
          else
            echo "tests_failed=false" >> $GITHUB_OUTPUT
            echo "测试通过"
          fi

      - name: Extract failures
        if: steps.check.outputs.tests_failed == 'true'
        run: |
          echo "=== 提取失败信息 ==="
          grep -A 30 "FAILED" test-results/output.txt > test-results/failures.txt || echo "No failures found" > test-results/failures.txt
          cat test-results/failures.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Create Issue on failure
        if: steps.check.outputs.tests_failed == 'true' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          echo "创建 Issue 用于运行 #${RUN_NUMBER}"
          
          FAILURE_SUMMARY=$(cat test-results/failures.txt 2>/dev/null | head -20 || echo "测试失败")
          
          gh issue create \
            --title "[自动化Bug] 测试失败 - 运行 #${RUN_NUMBER}" \
            --body "## 🐛 测试失败报告\n\n**运行链接**: ${RUN_URL}\n\n**失败的测试**:\n\`\`\`\n${FAILURE_SUMMARY}\n\`\`\`\n\n---\n*此 issue 由 GitHub Actions 自动创建*" \
            --label "bug,auto-reported" \
            2>/dev/null || echo "Issue 创建失败或已存在"