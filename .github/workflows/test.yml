name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libegl1 libxkbcommon0 libglib2.0-0

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install flask flask-cors
          pip install pytest pytest-playwright pytest-html pytest-xdist
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install chromium --with-deps

      - name: Start demo server
        run: |
          cd demo
          python server.py &
          sleep 3
          curl -s -o /dev/null -w "%{http_code}" http://localhost:5000 || (echo "Server failed to start" && exit 1)

      - name: Run tests
        id: pytest
        continue-on-error: true
        run: |
          mkdir -p test-reports test-results/screenshots test-results/videos
          pytest test/ai/generated/activity/ \
            -v \
            --tb=short \
            --browser=chromium \
            --headed=false \
            --html=test-reports/test_report.html \
            --self-contained-html \
            --junitxml=test-results/junit.xml \
            2>&1 | tee test-results/pytest.log
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: |
            test-reports/test_report.html
            test-results/junit.xml
            test-results/pytest.log
          retention-days: 30

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: test-results/screenshots/
          if-no-files-found: ignore
          retention-days: 7

      - name: Notify on failure
        if: ${{ steps.pytest.outputs.exit_code != '0' && vars.WEBHOOK_URL != '' }}
        run: |
          curl -X POST "${{ vars.WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "text": "Activity Management tests failed",
              "repository": "${{ github.repository }}",
              "branch": "${{ github.ref_name }}",
              "commit": "${{ github.sha }}",
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'

      - name: Fail if tests failed
        if: steps.pytest.outputs.exit_code != '0'
        run: exit 1
