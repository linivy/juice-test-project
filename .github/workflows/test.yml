name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pytest pytest-playwright
          playwright install chromium
      
      - name: Start Juice Shop
        run: docker run -d -p 3000:3000 bkimminich/juice-shop
      
      - name: Wait for Juice Shop
        run: sleep 10
      
      - name: Run tests
        id: tests
        run: |
          pytest test/ -v --tb=short 2>&1 | tee test-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            test-results/
            test-output.txt
          retention-days: 7

      - name: Create Issue on failure
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          if [ "${{ steps.tests.outputs.exit_code }}" != "0" ] && [ "${{ github.event_name }}" = "push" ]; then
            FAILED=$(grep "FAILED" test-output.txt | head -5 | tr '\n' ';')
            echo "测试失败: ${RUN_URL}\\n失败用例: ${FAILED}" > issue_body.md
            gh issue create --title "[自动化Bug] 测试失败 - 运行 #${RUN_NUMBER}" --body-file issue_body.md --label "bug"
          fi