name: Create Issue on Test Failure

on:
  workflow_run:
    workflows: [Test]
    types: [completed]
    branches: [main, master]

jobs:
  create-issue:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get workflow run info
        id: run_info
        uses: actions/github-script@v7
        with:
          script: |
            const run = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });
            return {
              run_id: run.data.id,
              run_url: run.data.html_url,
              head_branch: run.data.head_branch,
              head_sha: run.data.head_sha?.substring(0, 7),
              created_at: run.data.created_at,
              event: run.data.event,
              actor: run.data.actor.login,
            };

      - name: Download test artifacts
        uses: actions/download-artifact@v4
        with:
          name: test-report
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts/

      - name: Extract error summary
        id: error_summary
        run: |
          ERROR_SUMMARY="No details available"
          if [ -f artifacts/pytest.log ]; then
            FAILURES=$(grep -c "FAILED" artifacts/pytest.log 2>/dev/null || echo "0")
            ERRORS=$(grep -c "ERROR" artifacts/pytest.log 2>/dev/null || echo "0")
            ERROR_SUMMARY="${FAILURES} failures, ${ERRORS} errors"
            echo "failures=$FAILURES" >> $GITHUB_OUTPUT
            echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          fi
          echo "summary=$ERROR_SUMMARY" >> $GITHUB_OUTPUT

      - name: Build error details
        id: error_details
        run: |
          {
            echo '## Test Failure Details'
            echo ''
            if [ -f artifacts/pytest.log ]; then
              echo '```'
              grep -A 3 "FAILED\|ERROR" artifacts/pytest.log | head -60 || echo "No summary available"
              echo '```'
            fi
          } > error_body.md

      - name: Classify failures
        id: auto_fix
        run: |
          CLASSIFICATION=""
          FIX_HINTS=""
          if [ -f artifacts/pytest.log ]; then
            # P0 — Selector failures
            if grep -qE 'locator\.(fill|click).*target not|waiting for selector.*TimeoutError' artifacts/pytest.log; then
              CLASSIFICATION="P0 — Selector / Locator Failure"
              FIX_HINTS="Check selectors against config/activity.yaml. Use grep on demo/activity_management.html for actual IDs."
            fi
            # P1 — Timing failures
            if grep -qE 'TimeoutError.*to be visible|wait_for_selector.*exceeded' artifacts/pytest.log; then
              CLASSIFICATION="${CLASSIFICATION:+$CLASSIFICATION, }P1 — Timing / Wait Failure"
              FIX_HINTS="${FIX_HINTS:+$FIX_HINTS; }Missing cascade prerequisite or wait too short. Ensure page.select_option before waiting."
            fi
            # P2 — Assertion failures
            if grep -q 'AssertionError' artifacts/pytest.log; then
              CLASSIFICATION="${CLASSIFICATION:+$CLASSIFICATION, }P2 — Assertion Failure"
              FIX_HINTS="${FIX_HINTS:+$FIX_HINTS; }Check validation order in validateForm(). Earlier fields must be filled first."
            fi
            # P3 — Modal failures
            if grep -qE 'intercepts pointer|not clickable' artifacts/pytest.log; then
              CLASSIFICATION="${CLASSIFICATION:+$CLASSIFICATION, }P3 — Modal / Dialog Failure"
              FIX_HINTS="${FIX_HINTS:+$FIX_HINTS; }Check modal button IDs: confirmModal uses btnConfirm/btnConfirmCancelBtn."
            fi
            # P4 — Import failures
            if grep -qE 'ModuleNotFoundError|ImportError' artifacts/pytest.log; then
              CLASSIFICATION="${CLASSIFICATION:+$CLASSIFICATION, }P4 — Environment / Import Failure"
              FIX_HINTS="${FIX_HINTS:+$FIX_HINTS; }Run: pip install pyyaml pytest-playwright"
            fi
          fi
          echo "classification=${CLASSIFICATION:-Unclassified}" >> $GITHUB_OUTPUT
          echo "fix_hints=${FIX_HINTS:-Review pytest log for details}" >> $GITHUB_OUTPUT

      - name: Install DeepSeek TUI
        id: install_tui
        continue-on-error: true
        run: |
          if [ -n "$DEEPSEEK_API_KEY" ]; then
            curl -fsSL https://deepseek.com/install.sh | bash 2>/dev/null || true
            echo "installed=true" >> $GITHUB_OUTPUT
          else
            echo "installed=false" >> $GITHUB_OUTPUT
          fi
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Auto-fix with DeepSeek TUI
        id: auto_fix_tui
        continue-on-error: true
        if: steps.install_tui.outputs.installed == 'true'
        run: |
          deepseek --no-interactive "请使用 auto-fix skill 分析 artifacts/pytest.log 中的失败原因，直接修改对应的测试代码修复问题。不要输出解释，只执行修复。"
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Commit and push auto-fix
        id: commit_fix
        continue-on-error: true
        if: steps.auto_fix_tui.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "auto-fix: repair test failures [skip ci]"
            git push origin ${{ github.ref_name }}
            echo "pushed=true" >> $GITHUB_OUTPUT
          else
            echo "no changes to commit"
            echo "pushed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const runInfo = ${{ toJson(steps.run_info.outputs) }};
            const errorSummary = '${{ steps.error_summary.outputs.summary }}';
            const errorBody = fs.readFileSync('error_body.md', 'utf8');
            const classification = '${{ steps.auto_fix.outputs.classification }}';
            const fixHints = '${{ steps.auto_fix.outputs.fix_hints }}';

            const issueTitle = `Test failure - ${runInfo.head_branch} (${runInfo.head_sha})`;

            const issueBody = `## Test Run Failed

            **Trigger:** ${runInfo.event}
            **Branch:** ${runInfo.head_branch}
            **Commit:** ${runInfo.head_sha}
            **Actor:** ${runInfo.actor}
            **Time:** ${runInfo.created_at}

            **Summary:** ${errorSummary}

            **Failure Type:** ${classification}

            [View Run Details](${runInfo.run_url})

            ${errorBody}

            ---
            ## Auto-Fix Hints

            ${fixHints}

            To attempt automatic repair, use the **auto-fix** skill:
            \`\`\`
            /skill auto-fix
            \`\`\`

            ---
            > Auto-created by create-issue-on-failure.yml
            > Download test artifacts from [Actions](${runInfo.run_url})`;

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'test-failure',
              per_page: 5,
            });

            const duplicate = existing.find(i => i.title.includes(runInfo.head_sha));
            if (duplicate) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: duplicate.number,
                body: `Retry failed on same commit: ${runInfo.head_sha}\n[View Run](${runInfo.run_url})`,
              });
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: issueBody,
              labels: ['test-failure', 'automated'],
            });
