name: Create Issue on Test Failure

on:
  workflow_run:
    workflows: ["Run Tests"]
    types:
      - completed

jobs:
  create-issue:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    permissions:
      issues: write
      actions: read
      contents: read
    steps:
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: ./test-results
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Get failure details
        id: failures
        run: |
          FAILURE_DETAILS=""
          
          # 尝试从 output.txt 提取失败信息
          if [ -f ./test-results/output.txt ]; then
            FAILURE_DETAILS=$(grep -A 10 "FAILED" ./test-results/output.txt | head -50)
          fi
          
          # 如果 output.txt 没有，尝试从 results.xml 提取
          if [ -z "$FAILURE_DETAILS" ] && [ -f ./test-results/results.xml ]; then
            FAILURE_DETAILS=$(grep -A 5 "failure" ./test-results/results.xml | head -30)
          fi
          
          # 如果都没有，使用默认消息
          if [ -z "$FAILURE_DETAILS" ]; then
            FAILURE_DETAILS="测试失败，请查看运行日志获取详细信息"
          fi
          
          # 设置输出
          echo "details<<EOF" >> $GITHUB_OUTPUT
          echo "$FAILURE_DETAILS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          RUN_NUMBER: ${{ github.event.workflow_run.run_number }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          REPO: ${{ github.repository }}
        run: |
          gh issue create \
            --title "[自动化Bug] 测试失败 - 运行 #${RUN_NUMBER}" \
            --body "## 🐛 测试失败报告\n\n**运行链接**: ${RUN_URL}\n\n**分支**: ${BRANCH}\n\n**失败详情**:\n\`\`\`\n${{ steps.failures.outputs.details }}\n\`\`\`\n\n---\n*此 issue 由 GitHub Actions 自动创建*" \
            --label "bug,auto-reported"